<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — e-Documents Admin</title>

    <link rel="stylesheet" href="../../assets/css/all.min.css" />
    <link rel="stylesheet" href="../../assets/css/admin-dashboard.css" />
</head>

<body data-page="dashboard" data-title="Dashboard">
    <div class="dashboard-page">

        <div id="sidebar-mount"></div>

        <div class="dashboard-main">
            <div id="topbar-mount"></div>

            <main class="dashboard-content page-transition">

                <!-- Welcome Banner -->
                <section class="welcome-banner">
                    <div class="welcome-text">
                        <h2 class="welcome-title" id="welcome-title">—</h2>
                        <p class="welcome-sub" id="welcome-sub">Loading your dashboard...</p>
                    </div>
                    <div class="welcome-actions">
                        <span class="service-badge" id="service-badge">—</span>
                        <a href="requests-management.html" class="btn-banner btn-banner--outline">
                            <i class="fa-regular fa-file-lines"></i>
                            View All Requests
                        </a>
                    </div>
                </section>

                <!-- Stats Cards -->
                <section class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-left">
                            <span class="stat-label">Total Requests</span>
                            <span class="stat-value" id="stat-total">—</span>
                            <span class="stat-sub" id="stat-total-sub"></span>
                        </div>
                        <div class="stat-icon stat-icon--blue">
                            <i class="fa-regular fa-file-lines"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-left">
                            <span class="stat-label">Pending</span>
                            <span class="stat-value" id="stat-pending">—</span>
                            <span class="stat-sub stat-sub--yellow" id="stat-pending-sub"></span>
                        </div>
                        <div class="stat-icon stat-icon--yellow">
                            <i class="fa-regular fa-clock"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-left">
                            <span class="stat-label">Approved</span>
                            <span class="stat-value" id="stat-approved">—</span>
                            <span class="stat-sub stat-sub--green" id="stat-approved-sub"></span>
                        </div>
                        <div class="stat-icon stat-icon--green">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-left">
                            <span class="stat-label">Rejected</span>
                            <span class="stat-value" id="stat-rejected">—</span>
                            <span class="stat-sub stat-sub--red" id="stat-rejected-sub"></span>
                        </div>
                        <div class="stat-icon stat-icon--red">
                            <i class="fa-solid fa-circle-xmark"></i>
                        </div>
                    </div>
                </section>

                <!-- Pending Requests -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3 class="dash-card-title">
                            <i class="fa-regular fa-clock"></i>
                            Pending Requests
                        </h3>
                        <a href="requests-management.html" class="dash-card-link">
                            View all <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>

                    <!-- Empty state — no pending -->
                    <div class="empty-state" id="empty-pending" style="display:none;">
                        <i class="fa-solid fa-circle-check"></i>
                        <p>All caught up!</p>
                        <span>No pending requests at the moment.</span>
                    </div>

                    <!-- Table -->
                    <div class="table-wrapper" id="pending-table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Request ID</th>
                                    <th>User</th>
                                    <th>Submitted</th>
                                    <th>Compliance</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="pending-tbody">
                                <!-- filled by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/router.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/notification.js"></script>
    <script src="../../assets/js/admin-dashboard.js"></script>
</body>

</html>
